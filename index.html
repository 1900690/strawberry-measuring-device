<!doctype html>
<html lang="ja">
  <head>
    <title>Strawberry Predictor Pro | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * Strawberry Predictor Pro
       * A VR application to predict the size and weight of a strawberry.
       */
      class StrawberryPredictorPro extends xb.Script {
        init() {
          this.mode = 'menu';
          this.isGrabbing = false;
          this._handToObject = null;
          this.sampleTarget = null;
          this.isDetecting = false;

          this.setupLighting();
          this.createUI();
        }

        setupLighting() {
          this.add(new THREE.HemisphereLight(0xdddddd, 0x888888, 2.0));
          const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
          dirLight.position.set(1, 3, 2).normalize();
          this.add(dirLight);
        }

        createUI() {
          // Main Menu Panel
          this.menuPanel = new xb.SpatialPanel({
            width: 1.0,
            height: 0.8,
            backgroundColor: '#1e1e1eaa',
          });
          this.menuPanel.position.set(0, 1.5, -1.0);
          this.add(this.menuPanel);

          const menuGrid = this.menuPanel.addGrid();
          menuGrid.addRow({ weight: 0.3 }).addText({
            text: '🍓 イチゴ測定システム',
            fontColor: '#ff6666',
            fontSize: 0.08,
          });

          const btnRow1 = menuGrid.addRow({ weight: 0.25 });
          const sampleBtn = btnRow1.addCol({ weight: 0.8 }).addTextButton({
            text: 'サンプル(GLB)で試す',
            backgroundColor: '#ff6666',
            fontColor: '#ffffff',
            fontSize: 0.05
          });
          sampleBtn.onTriggered = () => this.startSampleMode();

          const btnRow2 = menuGrid.addRow({ weight: 0.25 });
          const realBtn = btnRow2.addCol({ weight: 0.8 }).addTextButton({
            text: '実際のイチゴを測定する',
            backgroundColor: '#66aa66',
            fontColor: '#ffffff',
            fontSize: 0.05
          });
          realBtn.onTriggered = () => this.startRealMode();
          
          menuGrid.addRow({ weight: 0.2 });

          // Result Panel
          this.resultPanel = new xb.SpatialPanel({
            width: 0.8,
            height: 0.6,
            backgroundColor: '#112233cc',
          });
          this.resultPanel.position.set(0, 1.6, -1.2);
          this.resultPanel.visible = false;
          this.add(this.resultPanel);

          const resGrid = this.resultPanel.addGrid();
          
          const headerRow = resGrid.addRow({ weight: 0.2 });
          this.modeLabel = headerRow.addCol({ weight: 0.8 }).addText({
            text: 'モード',
            fontColor: '#ffffff',
            fontSize: 0.05,
          });
          const backBtn = headerRow.addCol({ weight: 0.2 }).addIconButton({
            text: 'close',
            fontSize: 0.3,
            fontColor: '#ffaaaa'
          });
          backBtn.onTriggered = () => this.showMenu();

          const contentRow = resGrid.addRow({ weight: 0.7 });
          const col = contentRow.addCol({ weight: 1 });

          this.statusLabel = col.addRow({ weight: 0.2 }).addText({
            text: '待機中...',
            fontColor: '#aaaaaa',
            fontSize: 0.04,
          });

          this.sizeLabel = col.addRow({ weight: 0.4 }).addText({
            text: '大きさ: -- cm',
            fontColor: '#aaffaa',
            fontSize: 0.05,
          });

          this.weightLabel = col.addRow({ weight: 0.4 }).addText({
            text: '予測重量: -- g',
            fontColor: '#ffffaa',
            fontSize: 0.06,
          });

          resGrid.addRow({ weight: 0.1 });
        }

        showMenu() {
          this.mode = 'menu';
          this.menuPanel.visible = true;
          this.resultPanel.visible = false;
          if (this.sampleTarget) {
            this.remove(this.sampleTarget);
            this.sampleTarget = null;
          }
        }

        async startSampleMode() {
          this.mode = 'sample';
          this.menuPanel.visible = false;
          this.resultPanel.visible = true;
          this.modeLabel.setText('🍓 サンプルモード');
          this.statusLabel.setText('目の前のイチゴを手で掴んでください');

          try {
            const loader = new xb.ModelLoader();
            const gltf = await loader.load({
              url: 'f5d669579e8d405e9734386e2789355a.glb',
              renderer: xb.core.renderer
            });

            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetSize = 0.05; 
            model.scale.setScalar(targetSize / maxDim);
            
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center.multiplyScalar(targetSize / maxDim));

            this.sampleTarget = new THREE.Group();
            this.sampleTarget.add(model);
            this.sampleTarget.position.set(0, 1.3, -0.4);
            
            this.add(this.sampleTarget);
          } catch (e) {
            this.statusLabel.setText('モデルの読み込みに失敗しました');
          }
        }

        startRealMode() {
          this.mode = 'real';
          this.menuPanel.visible = false;
          this.resultPanel.visible = true;
          this.modeLabel.setText('🍓 リアル測定モード');
          this.statusLabel.setText('実際のイチゴを視野に入れてピンチしてください');
        }

        async onSelectEnd(event) {
          if (this.mode !== 'real' || this.isDetecting) return;
          
          this.isDetecting = true;
          this.statusLabel.setText('空間を分析中...');

          try {
            const detectedObjects = await xb.world.objects.runDetection();

            if (detectedObjects && detectedObjects.length > 0) {
              let targetObj = detectedObjects[0];
              let minDistance = Infinity;
              const cameraPos = xb.core.camera.position;
              
              detectedObjects.forEach(obj => {
                const dist = obj.position.distanceTo(cameraPos);
                if (dist < minDistance) {
                  minDistance = dist;
                  targetObj = obj;
                }
              });

              const widthCm = targetObj.scale.x * 100;
              const heightCm = targetObj.scale.y * 100;
              const depthCm = targetObj.scale.z * 100;

              const volume = (4 / 3) * Math.PI * (widthCm / 2) * (heightCm / 2) * (depthCm / 2);
              const predictedWeight = volume * 0.9;

              this.sizeLabel.setText(`大きさ: ${widthCm.toFixed(1)} x ${heightCm.toFixed(1)} x ${depthCm.toFixed(1)} cm`);
              this.weightLabel.setText(`予測重量: ${predictedWeight.toFixed(1)} g`);
              this.statusLabel.setText('測定完了');
            } else {
              this.statusLabel.setText('イチゴが見つかりませんでした');
            }
          } catch (e) {
            this.statusLabel.setText('分析エラーが発生しました');
          }

          this.isDetecting = false;
        }

        onObjectGrabStart(event) {
          if (this.mode !== 'sample' || this.isGrabbing || !this.sampleTarget) return;
          
          const handPos = event.hand.position;
          const targetPos = this.sampleTarget.position;
          if (handPos.distanceTo(targetPos) > 0.15) return;

          this.isGrabbing = true;
          this.sampleTarget.updateMatrixWorld(true);
          event.hand.updateMatrixWorld(true);

          const H0 = new THREE.Matrix4().copy(event.hand.matrixWorld);
          const O0 = new THREE.Matrix4().copy(this.sampleTarget.matrixWorld);
          this._handToObject = new THREE.Matrix4().copy(H0).invert().multiply(O0);

          this.predictSampleProperties();
        }

        onObjectGrabbing(event) {
          if (!this.isGrabbing || !this._handToObject || !this.sampleTarget) return;

          event.hand.updateMatrixWorld(true);
          const H = new THREE.Matrix4().copy(event.hand.matrixWorld);
          const O = new THREE.Matrix4().multiplyMatrices(H, this._handToObject);
          const parent = this.sampleTarget.parent;
          const parentInv = parent
            ? new THREE.Matrix4().copy(parent.matrixWorld).invert()
            : new THREE.Matrix4().identity();

          const Olocal = new THREE.Matrix4().multiplyMatrices(parentInv, O);
          const pos = new THREE.Vector3();
          const quat = new THREE.Quaternion();
          const scl = new THREE.Vector3();
          Olocal.decompose(pos, quat, scl);

          this.sampleTarget.position.copy(pos);
          this.sampleTarget.quaternion.copy(quat);
        }

        onObjectGrabEnd() {
          if (!this.isGrabbing) return;
          this.isGrabbing = false;
          this._handToObject = null;
        }

        predictSampleProperties() {
          this.statusLabel.setText('分析完了！');
          const widthCm = 4.5 + Math.random() * 1.0;
          const heightCm = 5.0 + Math.random() * 1.5;
          const depthCm = 4.5 + Math.random() * 1.0;
          const volume = (4 / 3) * Math.PI * (widthCm / 2) * (heightCm / 2) * (depthCm / 2);
          const weight = volume * 0.9;

          this.sizeLabel.setText(`大きさ: ${widthCm.toFixed(1)} x ${heightCm.toFixed(1)} x ${depthCm.toFixed(1)} cm`);
          this.weightLabel.setText(`予測重量: ${weight.toFixed(1)} g`);
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.setAppTitle('Strawberry Predictor Pro');
        
        options.enableUI();
        options.enableHands();
        options.hands.visualization = true;
        options.simulator.defaultMode = xb.SimulatorMode.POSE;

        // Camera and Detection Setup
        options.enableCamera('environment');
        options.enableDepth();
        options.world.enableObjectDetection();
        options.world.objects.showDebugVisualizations = true;

        xb.add(new StrawberryPredictorPro());
        xb.init(options);
      });
    </script>
  </body>
</html>
