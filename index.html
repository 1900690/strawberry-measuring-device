<!doctype html>
<html lang="en">
  <head>
    <title>Strawberry Weigher | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      const LEFT_HAND_INDEX = 0;
      const RIGHT_HAND_INDEX = 1;

      /**
       * 両手でつまんだ距離からイチゴの重さを予測するアプリ
       * 左手: イチゴの幅 (Width)
       * 右手: イチゴの高さ (Height)
       */
      class StrawberryWeigher extends xb.Script {
        init() {
          // 光源の追加
          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));
          const light = new THREE.DirectionalLight(0xffffff, 1.5);
          light.position.set(1, 4, 1);
          this.add(light);

          // イチゴの3Dモデル（プロシージャル生成）
          this.strawberryGroup = new THREE.Group();
          
          // 実（赤い楕円体）
          const berryGeo = new THREE.SphereGeometry(1, 32, 32);
          const berryMat = new THREE.MeshStandardMaterial({ color: 0xe62222, roughness: 0.4 });
          this.berry = new THREE.Mesh(berryGeo, berryMat);
          this.strawberryGroup.add(this.berry);

          // ヘタ（緑の円錐）
          const stemGeo = new THREE.ConeGeometry(0.6, 0.4, 8);
          const stemMat = new THREE.MeshStandardMaterial({ color: 0x228822, roughness: 0.8 });
          this.stem = new THREE.Mesh(stemGeo, stemMat);
          this.stem.position.y = 1; // 球体の頂上に配置
          this.strawberryGroup.add(this.stem);

          this.strawberryGroup.visible = false; // 初期状態は非表示
          this.add(this.strawberryGroup);

          // UIパネルの作成
          this.panel = new xb.SpatialPanel({
            width: 1.2,
            height: 0.8,
            backgroundColor: '#2b2b2baa',
          });
          this.panel.position.set(0, xb.user.height, -xb.user.objectDistance);
          this.add(this.panel);

          const grid = this.panel.addGrid();
          grid.addRow({ weight: 0.2 }).addText({
            text: '🍓 イチゴ重量チェッカー',
            fontSize: 0.08,
            fontColor: '#ff6666'
          });
          
          this.widthText = grid.addRow({ weight: 0.2 }).addText({
            text: '左手（幅）: -- cm',
            fontSize: 0.06,
            fontColor: '#ffffff'
          });
          
          this.heightText = grid.addRow({ weight: 0.2 }).addText({
            text: '右手（高さ）: -- cm',
            fontSize: 0.06,
            fontColor: '#ffffff'
          });
          
          this.weightText = grid.addRow({ weight: 0.4 }).addText({
            text: '両手でつまんで測定してください',
            fontSize: 0.07,
            fontColor: '#88ff88'
          });
        }

        // 親指と人差し指の距離を計算するヘルパー
        _getPinchDistance(joints) {
          if (!joints) return 0;
          const thumb = joints['thumb-tip'];
          const index = joints['index-finger-tip'];
          if (thumb && index && thumb.position && index.position) {
            return thumb.position.distanceTo(index.position);
          }
          return 0;
        }

        update() {
          const handsObj = xb.user.hands;

          // 両手がトラッキングされているか確認
          if (handsObj && handsObj.hands && handsObj.hands.length === 2) {
            const leftJoints = handsObj.hands[LEFT_HAND_INDEX].joints;
            const rightJoints = handsObj.hands[RIGHT_HAND_INDEX].joints;

            if (Object.keys(leftJoints).length > 0 && Object.keys(rightJoints).length > 0) {
              // 幅（左手）と高さ（右手）をメートル単位で取得
              const widthM = this._getPinchDistance(leftJoints);
              const heightM = this._getPinchDistance(rightJoints);

              // センチメートルに変換
              const wCm = widthM * 100;
              const hCm = heightM * 100;

              // 両手が近すぎる（1cm未満）場合は測定しない
              if (wCm > 1.0 && hCm > 1.0) {
                // 楕円体の体積計算: V = 4/3 * π * (w/2) * (w/2) * (h/2) = (π/6) * w^2 * h
                const volume = (Math.PI / 6) * Math.pow(wCm, 2) * hCm;
                // イチゴの密度を約0.9g/cm³として重さを予測
                const weight = volume * 0.9;

                // UIの更新
                this.widthText.setText(`左手（幅）: ${wCm.toFixed(1)} cm`);
                this.heightText.setText(`右手（高さ）: ${hCm.toFixed(1)} cm`);
                this.weightText.setText(`予測重量: ${weight.toFixed(1)} g`);

                // イチゴモデルのサイズと位置を更新
                this.strawberryGroup.visible = true;
                
                // 幅、高さ、奥行き(幅と同じと仮定)にスケールを合わせる
                // BaseのSphereの直径が2なので、半分( /2 )のスケールを掛ける
                this.strawberryGroup.scale.set(widthM / 2, heightM / 2, widthM / 2);

                // イチゴを両手の中間地点に配置する
                const leftPos = leftJoints['index-finger-tip'].position;
                const rightPos = rightJoints['index-finger-tip'].position;
                const midPoint = new THREE.Vector3().addVectors(leftPos, rightPos).multiplyScalar(0.5);
                this.strawberryGroup.position.copy(midPoint);
                return;
              }
            }
          }

          // 手が検出されない、またはつまんでいない時の状態
          this.strawberryGroup.visible = false;
          this.widthText.setText(`左手（幅）: -- cm`);
          this.heightText.setText(`右手（高さ）: -- cm`);
          this.weightText.setText(`両手でつまんで測定してください`);
        }
      }

      function start() {
        const options = new xb.Options();
        options.setAppTitle('Strawberry Weigher');
        
        // ハンドトラッキングの有効化
        options.enableHands();
        options.hands.enabled = true;
        options.hands.visualization = true;
        options.hands.visualizeJoints = true;
        options.hands.visualizeMeshes = true;
        
        // シミュレーター用のモード設定（指を動かすため）
        options.simulator.defaultMode = xb.SimulatorMode.POSE;

        xb.add(new StrawberryWeigher());
        xb.init(options);
      }

      document.addEventListener('DOMContentLoaded', start);
    </script>
  </body>
</html>
